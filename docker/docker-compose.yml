# RAG Service 编排 — qdrant + redis + rag-service
# 启动: docker-compose -f docker/docker-compose.yml up -d

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - /opt/uboss/haojie.liu/rag-data/qdrant:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: rag-redis
    ports:
      - "6380:6379"
    volumes:
      - /opt/uboss/haojie.liu/rag-data/redis:/data
    restart: unless-stopped
    command: redis-server --appendonly yes

  rag-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: rag-service
    network_mode: host
    environment:
      RAG_EMBEDDING_MODEL: /models/BAAI/bge-small-zh-v1.5
      RAG_RERANKER_MODEL: /models/BAAI/bge-reranker-base
      RAG_EMBEDDING_DEVICE: cpu
      RAG_RERANKER_DEVICE: cpu
      QDRANT_URL: http://127.0.0.1:6333
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6380
      LLM_BASE_URL: "https://bailian.brgroup.com"
      LLM_API_KEY: "sk-D6aImOGGzOq2S3vWsWLTW547eoZNlLOJjiScS0X4J9s6lrYR"
      LLM_MODEL: "DeepSeek-V4-flash"
      RAG_SERVICE_API_KEY: "${RAG_SERVICE_API_KEY:-}"
      RAG_KNOWLEDGE_ROOT: /app/knowledge_base
      RAG_INDEX_DIR: /indexes
      RAG_BM25_INDEX_DIR: /indexes/bm25
      HF_HUB_OFFLINE: "1"
    volumes:
      - /opt/uboss/haojie.liu/rag-data/models/huggingface:/models:ro
      - /opt/uboss/haojie.liu/rag-data/indexes:/indexes
      - /opt/uboss/haojie.liu/rag-data/logs:/app/logs
    restart: unless-stopped
